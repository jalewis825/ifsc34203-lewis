<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Assignement showing understnding of implementing native media, both audio and video."
    />
    <meta name="author" content="Jessi Lewis" />
    <title>IFSC 34203 | HTML5 Native Media</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/img/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/img/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/img/favicon-16x16.png"
    />
    <link rel="stylesheet" href="assets/css/screen.css" />
  </head>
  <body>
    <main class="container">
      <video poster="assets/img/hudson-shelter-falls.jpg" width="640" height="360"  controls>
        <source width="640" height="360" src="assets/media/video/hudson-shelter-falls.mp4" type="video/mp4"/>
        <source width="640" height="360" src="assets/media/video/hudson-shelter-falls.ogv" type="video/ogg"/>
        <source width="640" height="360" src="assets/media/video/hudson-shelter-falls.webm" type="video/webm"/>
      </video>

      <audio controls="controls">
        <source src="assets/media/audio/thunder.mp3" type="audio/mp3"/>
        <source src="assets/media/audio/thunder.ogg" type="audio/ogg"/>
        <source src="assets/media/audio/thunder.wav" type="audio/wav"/>
      </audio>
    </main>
  </body>
</html>
